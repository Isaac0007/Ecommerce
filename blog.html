<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - AnonymousOnline</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        #page-header {
            background-image: url('images/banner.png');
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 60px 20px;
            background-color: rgba(0,0,0,0.5);
            background-blend-mode: overlay;
        }
        #page-header h2 {
            color: darkcyan;
            font-size: 42px;
        }
        #page-header p {
            color: white;
            font-weight: 600;
        }
        .blog-container {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }
        .blog-box {
            display: flex;
            align-items: center;
            gap: 30px;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .blog-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .blog-img {
            flex: 1;
            min-width: 300px;
        }
        .blog-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .blog-details {
            flex: 1.5;
            padding: 30px;
        }
        .blog-details h4 {
            color: darkcyan;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .blog-details p {
            color: #555;
            line-height: 1.6;
            margin: 15px 0;
        }
        .blog-date {
            color: orangered;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }
        .read-more {
            color: darkcyan;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
            margin-top: 10px;
        }
        .copyright {
            text-align: center;
            margin-top: 40px;
            color: #555;
        }
        .read-more:hover {
            color: orangered;
        }
        @media (max-width: 768px) {
            .blog-box {
                flex-direction: column;
            }
            .blog-img {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <section id="header">
        <a href="index.html"><img src="images/logo.png" class="logo" alt="logo"></a>
        <div>
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a class="active" href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="account.html">Account</a></li>
                <li><a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a></li>
                <a href="#" id="close"><i class="fa-solid fa-xmark"></i></a>
            </ul>
        </div>
        <div id="mobile">
            <a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a>
            <i id="bar" class="fa-solid fa-bars"></i>
        </div>
    </section>

    <section id="page-header">
        <h2>#TechChronicles</h2>
        <p>Stay updated with latest tech trends & reviews</p>
    </section>

    <section id="blog" class="section-p1">
        <div class="blog-container" id="blog-container"></div>
    </section>
    
        <div class="copyright">
            <p>&copy;2026 Anonymous online Traders. All Rights Reserved</p>
        </div>

    <script src="script.js"></script>
    <script>
        const blogPosts = [
            {
                id: 1,
                title: "The Ultimate Guide to Choosing the Perfect Soundbar",
                date: "April 15, 2026",
                excerpt: "Discover the best soundbars for your home theater setup. From budget-friendly options to premium Dolby Atmos systems, we've got you covered.",
                content: "Full content here...",
                img: "images/jbl.jpg",
                category: "Audio"
            },
            {
                id: 2,
                title: "Top 10 Smart Home Gadgets You Need in 2026",
                date: "April 10, 2026",
                excerpt: "Transform your home into a smart haven with these innovative gadgets that make life easier and more efficient.",
                content: "Full content here...",
                img: "images/LG smart.jpg",
                category: "Smart Home"
            },
            {
                id: 3,
                title: "Gaming Revolution: PS5 vs Xbox Series X",
                date: "April 5, 2026",
                excerpt: "Which next-gen console delivers the best gaming experience? We compare performance, exclusives, and value.",
                content: "Full content here...",
                img: "images/Xbox.jpg",
                category: "Gaming"
            },
            {
                id: 4,
                title: "How to Maintain Your Kitchen Appliances",
                date: "March 28, 2026",
                excerpt: "Extend the life of your refrigerator, microwave, and other kitchen gadgets with these simple maintenance tips.",
                content: "Full content here...",
                img: "images/fridge.jpg",
                category: "Maintenance"
            },
            {
                id: 5,
                title: "Laptop Buying Guide: What to Look For in 2026",
                date: "March 20, 2026",
                excerpt: "From processors to RAM, learn how to choose the perfect laptop for work, study, or gaming.",
                content: "Full content here...",
                img: "images/Lenovo.jpg",
                category: "Computing"
            },
            {
                id: 6,
                title: "Energy-Efficient Appliances That Save Money",
                date: "March 15, 2026",
                excerpt: "Reduce your electricity bills with these energy-star rated appliances that are both eco-friendly and cost-effective.",
                content: "Full content here...",
                img: "images/washing.jpg",
                category: "Energy"
            }
        ];

        function renderBlogPosts() {
            const container = document.getElementById('blog-container');
            if (container) {
                container.innerHTML = blogPosts.map(post => `
                    <div class="blog-box">
                        <div class="blog-img">
                            <img src="${post.img}" alt="${post.title}">
                        </div>
                        <div class="blog-details">
                            <span class="blog-date"><i class="fa-regular fa-calendar"></i> ${post.date} | ${post.category}</span>
                            <h4>${post.title}</h4>
                            <p>${post.excerpt}</p>
                            <a href="#" class="read-more">CONTINUE READING →</a>
                        </div>
                    </div>
                `).join('');
            }
        }

        renderBlogPosts();
    </script>
</body>
</html>
