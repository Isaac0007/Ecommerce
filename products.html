<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - AnonTech Electronics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== PAGE HEADER ========== */
        #page-header {
            background-image: url('images/banner.png');
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 60px 20px;
            background-color: rgba(0,0,0,0.5);
            background-blend-mode: overlay;
        }
        #page-header h2 {
            color: darkcyan;
            font-size: 42px;
            margin-bottom: 10px;
        }
        #page-header p {
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        /* ========== PRODUCT GRID ========== */
        .pro-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
        }
        
        .pro {
            width: 23%;
            min-width: 220px;
            padding: 10px 12px;
            border: 1px solid #cce7d0;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 20px 20px 34px rgba(0,0,0,0.03);
            margin: 10px 0;
            transition: 0.2s ease;
            position: relative;
            background-color: rgb(209, 232, 242);
        }
        
        .pro:hover {
            box-shadow: 20px 20px 34px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }
        
        .pro img {
            width: 100%;
            border-radius: 20px;
            height: 180px;
            object-fit: cover;
        }
        
        .des {
            text-align: start;
            padding: 10px 0;
        }
        
        .des span {
            color: orangered;
            font-size: 12px;
            font-weight: 600;
        }
        
        .des h5 {
            padding-top: 7px;
            color: #1a1a1a;
            font-size: 14px;
            margin: 5px 0;
            line-height: 1.3;
            height: 40px;
            overflow: hidden;
        }
        
        .star i {
            font-size: 12px;
            color: rgb(243, 181, 25);
        }
        
        .des h4 {
            padding-top: 7px;
            font-size: 15px;
            font-weight: 700;
            color: orangered;
        }
        
        /* ========== CART BUTTON ========== */
        .cart-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #e8f6ea;
            border: 1px solid #cce7d0;
            position: absolute;
            bottom: 20px;
            right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.2s;
            z-index: 10;
        }
        
        .cart-btn i {
            font-size: 18px;
            color: orangered;
        }
        
        .cart-btn:hover {
            background-color: orangered;
        }
        
        .cart-btn:hover i {
            color: white;
        }
        
        /* ========== WISHLIST BUTTON ========== */
        .wishlist-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #e8f6ea;
            border: 1px solid #cce7d0;
            position: absolute;
            bottom: 20px;
            left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.2s;
            z-index: 10;
        }
        
        .wishlist-btn i {
            font-size: 18px;
            color: #ff4444;
        }
        
        .wishlist-btn:hover {
            background-color: #ff4444;
        }
        .copyright {
            text-align: center;
            margin-top: 40px;
            color: #555;
        }

        .wishlist-btn:hover i {
            color: white;
        }
        
        /* ========== TOAST NOTIFICATION ========== */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== PAGINATION ========== */
        .pagination {
            text-align: center;
            margin-top: 50px;
        }
        .pagination a {
            text-decoration: none;
            background-color: darkcyan;
            padding: 12px 18px;
            border-radius: 4px;
            color: white;
            font-weight: 600;
            margin: 0 5px;
            transition: 0.3s;
            display: inline-block;
        }
        .pagination a:hover {
            background-color: orangered;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .pro { width: 45%; }
        }
        @media (max-width: 480px) {
            .pro { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- ========== HEADER / NAVIGATION ========== -->
    <section id="header">
        <a href="index.html"><img src="images/logo.png" class="logo" alt="logo"></a>
        <div>
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a class="active" href="products.html">Products</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="account.html">Account</a></li>
                <li><a href="cart.html">
                    <i class="fa-solid fa-cart-arrow-down"></i>
                    <span id="cart-count" style="background: orangered; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-left: 5px;">0</span>
                </a></li>
                <li><a href="wishlist.html">
                    <i class="fa-regular fa-heart"></i>
                    <span id="wishlist-count" style="background: orangered; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-left: 5px;">0</span>
                </a></li>
                <a href="#" id="close"><i class="fa-solid fa-xmark"></i></a>
            </ul>
        </div>
        <div id="mobile">
            <a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a>
            <a href="wishlist.html"><i class="fa-regular fa-heart"></i></a>
            <i id="bar" class="fa-solid fa-bars"></i>
        </div>
    </section>

    <!-- ========== PAGE HEADER BANNER ========== -->
    <section id="page-header">
        <h2>#Stay_Connected</h2>
        <p>Save more with coupons & up to 70% off on all electronics!</p>
    </section>

    <!-- ========== PRODUCTS GRID ========== -->
    <section id="product1" class="section-p1">
        <div class="pro-container" id="products-container"></div>
    </section>

    <!-- ========== PAGINATION ========== -->
    <section id="pagination" class="section-p1">
        <div class="pagination">
            <a href="#">1</a>
            <a href="#">2</a>
            <a href="#">3</a>
            <a href="#"><i class="fa-solid fa-arrow-right"></i></a>
        </div>
   
        <div class="copyright">
            <p>&copy;2026 Anonymous online Traders. All Rights Reserved</p>
        </div>
   

    <script>
        // ========== PRODUCT DATABASE - 28 PRODUCTS (All from Homepage) ==========
        const products = [
            // Featured Products (from homepage)
            { id: 1, brand: "JBL", name: "Soundbar JBL Cinema 2.1 chanel SB180", price: 1014767, img: "images/jbl.jpg", stars: 5 },
            { id: 2, brand: "Hisense", name: "Hisense HS218 2.1ch Sound Bar", price: 590000, img: "images/Hisense.jpg", stars: 4 },
            { id: 3, brand: "JBL", name: "Original JBL Flip 6 Portable Speaker", price: 472661, img: "images/Original.jpg", stars: 5 },
            { id: 4, brand: "Samsung", name: "Samsung HW-C450 B-series 2.1ch Soundbar", price: 660000, img: "images/Samsung.jpg", stars: 4 },
            { id: 5, brand: "Ultimea", name: "Ultimea Poseidon D80 7.1 chanel", price: 1809523, img: "images/ultimea.jpg", stars: 5 },
            { id: 6, brand: "LG", name: "LG SMART TV 55 INCH", price: 2100000, img: "images/LG smart.jpg", stars: 5 },
            { id: 7, brand: "Lenovo", name: "Lenovo Legion 5 Pro 16\" Laptop", price: 5090000, img: "images/Lenovo.jpg", stars: 5 },
            { id: 8, brand: "Xbox", name: "Xbox Series X 1TB", price: 3000000, img: "images/Xbox.jpg", stars: 5 },
            
            // New Arrivals (from homepage)
            { id: 9, brand: "Digiwave", name: "Digiwave 48 Liters Electric Mini Oven 2000w", price: 190000, img: "images/microwave.jpg", stars: 4 },
            { id: 10, brand: "Whirlpool", name: "Whirlpool 20L Microwave Oven", price: 255000, img: "images/microwave 2.jpg", stars: 4 },
            { id: 11, brand: "ADH", name: "ADH 1.8Ltrs Stainless Steel Electric Kettle", price: 28500, img: "images/packle.jpg", stars: 4 },
            { id: 12, brand: "Hisense", name: "Hisense 180 Liters Deep Chest Freezer", price: 733000, img: "images/fridge.jpg", stars: 5 },
            { id: 13, brand: "Chiq", name: "Chiq 10kg Washing Machine", price: 1458000, img: "images/washing.jpg", stars: 5 },
            { id: 14, brand: "Phillips", name: "Philips Dry Flat Electric Iron", price: 60000, img: "images/phillips.jpg", stars: 4 },
            { id: 15, brand: "Hoffmans", name: "Hoffmans 2.5L Electric Kettle", price: 35000, img: "images/kettle.jpg", stars: 4 },
            { id: 16, brand: "Digiwave", name: "Digiwave 29\" Oscillating Tower Fan", price: 120000, img: "images/fan.jpg", stars: 4 },
            
            // Additional Electronics (Bonus Products)
            { id: 17, brand: "Apple", name: "iPhone 15 Pro Max 256GB", price: 4500000, img: "images/15promax.jpg", stars: 5 },
            { id: 18, brand: "Samsung", name: "Samsung Galaxy S24 Ultra", price: 3800000, img: "images/s24ultra.jpg", stars: 5 },
            { id: 19, brand: "Sony", name: "Sony WH-1000XM5 Headphones", price: 850000, img: "images/Sony.jpg", stars: 5 },
         { id: 20, brand: "Dell", name: "Dell XPS 15 Laptop", price: 6200000, img: "images/DELL XPS 15 7590.jpg", stars: 4 },
            { id: 21, brand: "HP", name: "HP Pavilion Desktop", price: 2800000, img: "images/Desktop.jpg", stars: 4 },
            { id: 22, brand: "Canon", name: "Canon EOS R50 Camera", price: 2350000, img: "images/canon.jpg", stars: 5 },
            { id: 23, brand: "Nintendo", name: "Nintendo Switch OLED", price: 950000, img: "images/Nintendo.jpg", stars: 5 },
            { id: 24, brand: "Bose", name: "Bose QuietComfort Earbuds", price: 450000, img: "images/Bose.jpg", stars: 4 },
            { id: 25, brand: "ASUS", name: "ASUS ROG Gaming Monitor 27", price: 1250000, img: "images/ASUS.jpg", stars: 5 },
            { id: 26, brand: "Logitech", name: "Logitech MX Master 3S Mouse", price: 185000, img: "images/Logitech.jpg", stars: 4 },
            { id: 27, brand: "Anker", name: "Anker Power Bank 26800mAh", price: 165000, img: "images/anker.jpg", stars: 4 },
            { id: 28, brand: "Samsung", name: "Samsung 1TB SSD T7", price: 220000, img: "images/telabyte.jpg", stars: 5 }
        ];

        // ========== CART FUNCTIONS ==========
        function getCart() {
            const cart = localStorage.getItem('shoppingCart');
            return cart ? JSON.parse(cart) : [];
        }

        function saveCart(cart) {
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountSpan = document.getElementById('cart-count');
            if (cartCountSpan) {
                cartCountSpan.textContent = totalItems;
            }
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const cart = getCart();
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
                showToast(`✓ Added another ${product.brand} ${product.name.substring(0, 25)}... to cart`);
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    brand: product.brand,
                    price: product.price,
                    img: product.img,
                    quantity: 1
                });
                showToast(`✓ ${product.brand} ${product.name.substring(0, 25)}... added to cart!`);
            }
            saveCart(cart);
        }

        // ========== WISHLIST FUNCTIONS ==========
        function getWishlist() {
            const wishlist = localStorage.getItem('wishlist');
            return wishlist ? JSON.parse(wishlist) : [];
        }

        function saveWishlist(wishlist) {
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            updateWishlistCount();
        }

        function updateWishlistCount() {
            const wishlist = getWishlist();
            const wishlistCountSpan = document.getElementById('wishlist-count');
            if (wishlistCountSpan) {
                wishlistCountSpan.textContent = wishlist.length;
            }
        }

        function addToWishlist(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            let wishlist = getWishlist();
            const existingItem = wishlist.find(item => item.id === productId);
            
            if (existingItem) {
                showToast(`⚠️ ${product.brand} ${product.name.substring(0, 25)}... is already in your wishlist!`);
            } else {
                wishlist.push({
                    id: product.id,
                    name: product.name,
                    brand: product.brand,
                    price: product.price,
                    img: product.img
                });
                saveWishlist(wishlist);
                showToast(`❤️ ${product.brand} ${product.name.substring(0, 25)}... added to wishlist!`);
            }
        }

        // ========== UI FUNCTIONS ==========
        function formatPrice(price) {
            return 'UGX ' + price.toLocaleString();
        }

        function showToast(message) {
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) {
                existingToast.remove();
            }
            
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `<i class="fa-solid fa-check-circle" style="margin-right: 10px;"></i>${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function subscribeNewsletter() {
            const email = document.getElementById('newsletterEmail');
            if (email.value && email.value.includes('@')) {
                alert(`Thanks for subscribing! ${email.value} will receive our latest offers.`);
                email.value = '';
            } else {
                alert('Please enter a valid email address.');
            }
        }

        // ========== RENDER PRODUCTS ==========
        function renderProducts() {
            const container = document.getElementById('products-container');
            if (!container) return;
            
            let productsHTML = '';
            
            for (let i = 0; i < products.length; i++) {
                const product = products[i];
                const starRating = '<i class="fa-solid fa-star"></i>'.repeat(product.stars);
                
                productsHTML += `
                    <div class="pro">
                        <img src="${product.img}" alt="${product.name}" 
                             onerror="this.src='https://placehold.co/400x300/008b8b/white?text=${product.brand}'">
                        <div class="des">
                            <span>${product.brand}</span>
                            <h5>${product.name}</h5>
                            <div class="star">
                                ${starRating}
                            </div>
                            <h4>${formatPrice(product.price)}</h4>
                        </div>
                        <a href="#" class="cart-btn" onclick="addToCart(${product.id}); return false;">
                            <i class="fa-solid fa-cart-arrow-down"></i>
                        </a>
                        <a href="#" class="wishlist-btn" onclick="addToWishlist(${product.id}); return false;">
                            <i class="fa-regular fa-heart"></i>
                        </a>
                    </div>
                `;
            }
            
            container.innerHTML = productsHTML;
        }

        // ========== MOBILE MENU TOGGLE ==========
        const bar = document.getElementById('bar');
        const nav = document.getElementById('navbar');
        const close = document.getElementById('close');
        
        if (bar && nav && close) {
            bar.addEventListener('click', () => {
                nav.classList.add('active');
            });
            
            close.addEventListener('click', () => {
                nav.classList.remove('active');
            });
        }

        // ========== INITIALIZE PAGE ==========
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartCount();
            updateWishlistCount();
        });
    </script>
</body>
</html>
